<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Phone allocation — assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a222c;
      --border: #2d3a47;
      --text: #e8edf2;
      --muted: #8b9aab;
      --accent: #3ecf8e;
      --accent-dim: #2a9d6644;
      --user-bubble: #243038;
      --bot-bubble: #162018;
      --error: #f07178;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -20%, var(--accent-dim), transparent),
        linear-gradient(180deg, #0f1419 0%, #0c1014 100%);
    }
    header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    header h1 {
      margin: 0;
      font-family: Fraunces, Georgia, serif;
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    header p {
      margin: 0;
      font-size: 0.85rem;
      color: var(--muted);
    }
    #thread {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1.5rem 6rem;
      max-width: 44rem;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .msg {
      max-width: 92%;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      line-height: 1.45;
      font-size: 0.95rem;
      white-space: pre-wrap;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--user-bubble);
      border: 1px solid var(--border);
    }
    .msg.assistant {
      align-self: flex-start;
      background: var(--bot-bubble);
      border: 1px solid #1e3d2e;
      color: #d4ece0;
    }
    .msg.error {
      align-self: stretch;
      background: #2a1818;
      border-color: var(--error);
      color: #ffcdd2;
    }
    .msg.meta {
      align-self: center;
      font-size: 0.8rem;
      color: var(--muted);
      background: transparent;
      border: none;
      padding: 0.25rem;
    }
    #composer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1rem 1.25rem 1.25rem;
      background: linear-gradient(transparent, #0f1419 28%);
      border-top: 1px solid var(--border);
    }
    #composer-inner {
      max-width: 44rem;
      margin: 0 auto;
      display: flex;
      gap: 0.6rem;
      align-items: flex-end;
    }
    #composer textarea {
      flex: 1;
      min-height: 2.75rem;
      max-height: 8rem;
      resize: vertical;
      padding: 0.65rem 0.9rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font: inherit;
      line-height: 1.4;
    }
    #composer textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-dim);
    }
    #composer button {
      padding: 0.65rem 1.2rem;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: #0a120e;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
    }
    #composer button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    #composer button:not(:disabled):hover {
      filter: brightness(1.06);
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>IT phone allocation</h1>
      <p>Directory: <code>ldap_people.userid</code> (+ city, building). Example: “Assign a phone for user jdoe” or “… EMP123”.</p>
    </div>
  </header>
  <div id="thread" aria-live="polite"></div>
  <div id="composer">
    <div id="composer-inner">
      <textarea id="input" rows="1" placeholder="Type your request…" autocomplete="off"></textarea>
      <button type="button" id="send">Send</button>
    </div>
  </div>
  <script>
    const thread = document.getElementById("thread");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");

    function addBubble(role, text, extraClass) {
      const div = document.createElement("div");
      div.className = "msg " + role + (extraClass ? " " + extraClass : "");
      div.textContent = text;
      thread.appendChild(div);
      thread.scrollTop = thread.scrollHeight;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      input.value = "";
      addBubble("user", text);
      sendBtn.disabled = true;
      addBubble("meta", "… working");

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text }),
        });
        thread.removeChild(thread.lastChild);
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          const detail = err.detail ?? res.statusText;
          addBubble("assistant", "Request failed: " + detail, "error");
          return;
        }
        const data = await res.json();
        let reply = (data.final_message && String(data.final_message).trim()) || "";
        if (!reply && data.hint) reply = data.hint;
        if (!reply) reply = "(No reply text — check Groq, GET /schema/ldap_people, and that phone_numbers has available rows for that site.)";
        addBubble("assistant", reply);
      } catch (e) {
        if (thread.lastChild?.classList?.contains("meta")) thread.removeChild(thread.lastChild);
        addBubble("assistant", "Network error: " + e.message, "error");
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
